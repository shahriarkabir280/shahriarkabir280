name: Update Streak Stats SVG

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows you to run it manually anytime

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Streak Stats SVG
        uses: denvercoder1/github-readme-streak-stats-action@v1
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          user: shahriarkabir280
          # Your exact style configurations mapped out as action inputs
          theme: github_dark
          hide_border: 'true'
          background: '060C1A'
          ring: '4ECCA3'
          fire: 'FB923C'
          currStreakLabel: '4ECCA3'
          border_radius: '8'

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "chore: update streak stats SVG"
          git push
